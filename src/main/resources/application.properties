# ── Datasource applicatif (visa_user) ─────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/visa_management
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=visa_user
spring.datasource.password=robot123
server.servlet.context-path=/

# ── Port et gestion du processus ───────────────────────────────────────────────
server.port=8080
spring.lifecycle.timeout-per-shutdown-phase=30s
spring.main.allow-circular-references=true
# ── JSP ViewResolver ───────────────────────────────────────────────────────────
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# ── JPA / Hibernate ────────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.show-sql=false

# Ensure LOBs are handled as bytea on Postgres (avoid OID large-object mapping)
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ── Flyway ─────────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=true

# ── Bootstrap admin (superuser postgres pour créer la DB et l'user) ────────────
app.db.admin.url=jdbc:postgresql://localhost:5432/postgres
app.db.admin.username=postgres
app.db.admin.password=robot123

# ── Upload ─────────────────────────────────────────────────────────────────────
app.upload.dir=C:/ETUDE_TSILAVO/visa/visa-management-uploads

# Limites d'upload : éviter les erreurs pour fichiers volumineux
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=50MB